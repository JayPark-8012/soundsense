name: soundsense
description: "SoundSense - 소음 측정기에서 소음 지도 플랫폼으로"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 네비게이션
  go_router: ^15.1.2

  # 소음 측정
  noise_meter: ^5.0.2

  # 로컬 DB
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 지도
  google_maps_flutter: ^2.10.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1

  # 위치
  geolocator: ^13.0.2

  # 차트
  fl_chart: ^0.70.2

  # 광고
  google_mobile_ads: ^5.3.0

  # 인앱 결제
  purchases_flutter: ^8.3.0

  # 권한
  permission_handler: ^11.4.0

  # 화면 꺼짐 방지
  wakelock_plus: ^1.2.8

  # 경로
  path_provider: ^2.1.5

  # 공유
  share_plus: ^10.1.4

  # 로컬 설정
  shared_preferences: ^2.3.3

  # 앱 정보
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/map_style_dark.json
